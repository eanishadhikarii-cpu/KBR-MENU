query ListAllRestaurants @auth(level: PUBLIC, insecureReason: "This operation is safe to expose to the public as it only fetches publicly available restaurant information.") {
  restaurants {
    id
    name
    description
    address
    phone
    logoUrl
  }
}

query GetRestaurantMenuCategories($restaurantId: UUID!) @auth(level: PUBLIC, insecureReason: "This operation is safe to expose to the public as menu categories are generally public.") {
  categories(where: {restaurantId: {eq: $restaurantId}}, orderBy: [{order: ASC}]) {
    id
    name
    order
    description
    menuItems_on_category {
      id
      name
      description
      price
      isVegetarian
      imageUrl
    }
  }
}

mutation CreateMenuItem($categoryId: UUID!, $name: String!, $price: Float!, $isVegetarian: Boolean!, $description: String, $imageUrl: String) @auth(level: USER, insecureReason: "This operation is safe to expose to all logged in users as they may be restaurant owners or staff.") {
  menuItem_insert(data: {
    categoryId: $categoryId,
    name: $name,
    price: $price,
    isVegetarian: $isVegetarian,
    description: $description,
    imageUrl: $imageUrl,
    createdAt_expr: "request.time"
  })
}

mutation UpdateRestaurantDescription($restaurantId: UUID!, $newDescription: String!) @auth(expr: "auth.uid != nil", insecureReason: "This operation is safe to expose to all logged in users as they may be restaurant owners or staff.") {
  restaurant_update(
    key: {id: $restaurantId},
    data: {description: $newDescription}
  )
}