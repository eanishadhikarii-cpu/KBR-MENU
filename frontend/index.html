<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>KBR Restro & Bar — Menu</title>
  <meta name="description" content="KBR Restro & Bar — Digital Menu" />
  <meta name="theme-color" content="#c8a96e" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <header class="header" id="header">
    <div class="header-top">
      <div class="brand">
        <div class="brand-logo"><img src="logo.jpg" alt="KBR Logo" /></div>
        <div class="brand-text">
          <h1 class="brand-name">KBR Restro &amp; Bar</h1>
          <div class="brand-meta">
            <span class="brand-dot"></span>
            <span class="brand-status">Open Now</span>
            <span class="brand-sep">·</span>
            <span class="brand-loc">Dine In</span>
          </div>
        </div>
      </div>
      <button class="theme-btn" id="themeToggle" aria-label="Toggle dark mode">
        <span id="themeIcon">🌙</span>
      </button>
    </div>

    <div class="search-row">
      <div class="search-box">
        <svg class="search-ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        <input type="text" id="searchInput" class="search-input" placeholder="Search dishes, drinks..." autocomplete="off" />
        <button class="search-clear" id="searchClear">✕</button>
      </div>
    </div>

    <nav class="cat-nav">
      <div class="cat-strip" id="catStrip">
        <button class="cat-btn active" data-id="all">All</button>
      </div>
    </nav>
  </header>

  <main class="main">
    <div id="menuWrap"></div>
    <div class="empty" id="emptyState" style="display:none">
      <div class="empty-ico">🍽️</div>
      <p>No items found</p>
      <span>Try a different search</span>
    </div>
  </main>

  <footer class="footer">
    <img src="footer.jpg" alt="KBR Restro & Bar" class="footer-img" />
  </footer>

  <button class="fab-top" id="scrollTop" aria-label="Back to top">↑</button>

  <script src="app.js"></script>
</body>
</html>
